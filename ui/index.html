<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rappi Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f18;
    --surface:  #161923;
    --panel:    #1e2130;
    --border:   #2a2e42;
    --accent:   #ff7a2f;
    --accent2:  #ffad6a;
    --text:     #e8eaf0;
    --muted:    #8b8fa8;
    --crit:     #f87171;
    --warn:     #fbbf24;
    --info:     #34d399;
    --crit-bg:  rgba(248,113,113,0.08);
    --warn-bg:  rgba(251,191,36,0.08);
    --info-bg:  rgba(52,211,153,0.08);
    --radius:   10px;
    --font:     'DM Sans', sans-serif;
    --mono:     'JetBrains Mono', monospace;
    --display:  'Syne', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--panel);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    transition: color .3s, border-color .3s;
  }
  .status-pill.ok { color: var(--info); border-color: rgba(52,211,153,0.25); }
  .status-pill.err { color: var(--crit); border-color: rgba(248,113,113,0.25); }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .suggestion-btn {
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    line-height: 1.4;
    padding: 8px 10px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: background .15s, border-color .15s, color .15s;
    display: block;
  }
  .suggestion-btn:hover {
    background: var(--panel);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .suggestion-btn:last-child { margin-bottom: 0; }

  .clear-btn {
    width: calc(100% - 32px);
    margin: 12px 16px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 12px;
    padding: 8px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    margin-top: auto;
    flex-shrink: 0;
  }
  .clear-btn:hover { color: var(--crit); border-color: rgba(248,113,113,0.35); }

  /* ── Chat area ── */
  .chat-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Welcome ── */
  .welcome {
    margin: auto;
    text-align: center;
    max-width: 380px;
    animation: fadeUp .5s ease both;
  }
  .welcome-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), #ff4f00);
    border-radius: 16px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .welcome h1 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .welcome p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* ── Message bubbles ── */
  .msg { animation: fadeUp .3s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-user {
    display: flex;
    justify-content: flex-end;
  }
  .msg-user .bubble {
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 14px 14px 3px 14px;
    max-width: 70%;
    line-height: 1.5;
  }

  .msg-bot {}
  .bot-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .bot-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), #ff4f00);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .bot-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .answer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
    white-space: pre-wrap;
  }

  /* ── Insights ── */
  .insights-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }
  .insights-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .insights-toggle {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    transition: transform .2s;
  }
  .insights-toggle.open { transform: rotate(180deg); }

  .insight-summary {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .insight-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .insight-card {
    border-radius: 8px;
    padding: 10px 14px;
    border-left: 3px solid;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .insight-card.critical {
    background: var(--crit-bg);
    border-color: var(--crit);
  }
  .insight-card.warning {
    background: var(--warn-bg);
    border-color: var(--warn);
  }
  .insight-card.info {
    background: var(--info-bg);
    border-color: var(--info);
  }

  .insight-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .severity-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .critical .severity-badge { color: var(--crit); background: rgba(248,113,113,0.15); }
  .warning  .severity-badge { color: var(--warn); background: rgba(251,191,36,0.15); }
  .info     .severity-badge { color: var(--info); background: rgba(52,211,153,0.15); }

  .insight-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .insight-detail {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .insight-action {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    margin-top: 2px;
  }
  .insight-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .insight-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--panel);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* ── Loading ── */
  .loading-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }
  .typing-dots {
    display: flex;
    gap: 4px;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .loading-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Error message ── */
  .error-card {
    background: var(--crit-bg);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--crit);
    font-family: var(--mono);
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  #question {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 140px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #question::placeholder { color: var(--muted); }
  #question::-webkit-scrollbar { display: none; }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .1s;
  }
  .send-btn:hover { background: #ff6010; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { pointer-events: none; }

  .input-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    text-align: right;
    opacity: 0.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Rappi Analytics
  </div>
  <div class="status-pill" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<div class="main">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Suggested</div>
      <button class="suggestion-btn" onclick="fillQuestion(this)">Which stores have the highest cancellation rate?</button>
      <button class="suggestion-btn" onclick="fillQuestion(this)">Which areas have the most order delays?</button>
      <button class="suggestion-btn" onclick="fillQuestion(this)">Show the top 5 underperforming stores</button>
      <button class="suggestion-btn" onclick="fillQuestion(this)">What is the average delay per area?</button>
      <button class="suggestion-btn" onclick="fillQuestion(this)">Is there a correlation between delay rate and cancellation rate?</button>
      <button class="suggestion-btn" onclick="fillQuestion(this)">Which couriers have the most failed deliveries?</button>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
  </aside>

  <div class="chat-wrap">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">📦</div>
        <h1>Analytics Assistant</h1>
        <p>Ask anything about store performance, order delays, courier data, or zone-level metrics.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <textarea id="question" rows="1" placeholder="Ask about stores, orders, couriers…" autocomplete="off"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendQuestion()" title="Send (Enter)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let busy = false;

// ── Auto-resize textarea ─────────────────────────────────────────────────────
const ta = document.getElementById('question');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-text');
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      pill.className = 'status-pill ok';
      txt.textContent = 'api connected';
    } else throw new Error();
  } catch {
    pill.className = 'status-pill err';
    txt.textContent = 'api offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── Fill from suggestions ────────────────────────────────────────────────────
function fillQuestion(btn) {
  ta.value = btn.textContent.trim();
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  ta.focus();
}

// ── Clear ────────────────────────────────────────────────────────────────────
function clearChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = `<div class="welcome-icon">📦</div><h1>Analytics Assistant</h1><p>Ask anything about store performance, order delays, courier data, or zone-level metrics.</p>`;
  msgs.appendChild(w);
}

// ── Send ─────────────────────────────────────────────────────────────────────
async function sendQuestion() {
  if (busy) return;
  const q = ta.value.trim();
  if (!q) return;

  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  ta.value = '';
  ta.style.height = 'auto';
  setBusy(true);

  appendUser(q);
  const loadEl = appendLoading('Querying data…');

  let queryAnswer = null;

  try {
    // ── Layer 2: query ──────────────────────────────────────────────────────
    const chatRes = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    const chatData = await chatRes.json();

    loadEl.remove();

    if (!chatData.success && chatData.error) {
      appendError(chatData.error);
      setBusy(false);
      return;
    }

    queryAnswer = chatData.answer;

    // ── Layer 3: insights ───────────────────────────────────────────────────
    const insightLoad = appendLoading('Generating insights…');

    let insightData = null;
    try {
      const insRes = await fetch(`${API}/insights`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, query_result: queryAnswer }),
      });
      insightData = await insRes.json();
    } catch {
      // insights are optional — don't fail the whole response
    }
    insightLoad.remove();

    appendBot(queryAnswer, insightData);

  } catch (err) {
    loadEl?.remove();
    appendError('Could not reach the API. Is the server running at ' + API + '?');
  }

  setBusy(false);
  scrollToBottom();
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function setBusy(v) {
  busy = v;
  document.getElementById('send-btn').disabled = v;
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' });
}

function appendUser(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  msgs.appendChild(el);
  scrollToBottom();
  return el;
}

function appendLoading(label) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.innerHTML = `
    <div class="loading-row">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="loading-label">${label}</span>
    </div>`;
  msgs.appendChild(el);
  scrollToBottom();
  return el;
}

function appendError(msg) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.innerHTML = `<div class="error-card">⚠ ${escHtml(msg)}</div>`;
  msgs.appendChild(el);
  scrollToBottom();
}

function appendBot(answer, insights) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg msg-bot';

  let insightsHtml = '';
  if (insights && insights.success && insights.insights && insights.insights.length > 0) {
    const cards = insights.insights.map(ins => {
      const sev = ins.severity || 'info';
      const meta = [];
      if (ins.metric)           meta.push(ins.metric);
      if (ins.affected_entity)  meta.push(ins.affected_entity);

      return `
        <div class="insight-card ${sev}">
          <div class="insight-top">
            <span class="severity-badge">${sev}</span>
            <span class="insight-title">${escHtml(ins.title)}</span>
          </div>
          <div class="insight-detail">${escHtml(ins.detail)}</div>
          ${ins.suggested_action ? `<div class="insight-action">→ ${escHtml(ins.suggested_action)}</div>` : ''}
          ${meta.length ? `<div class="insight-meta">${meta.map(m => `<span class="insight-tag">${escHtml(m)}</span>`).join('')}</div>` : ''}
        </div>`;
    }).join('');

    const summary = insights.summary
      ? `<div class="insight-summary">${escHtml(insights.summary)}</div>`
      : '';

    insightsHtml = `
      <div>
        <div class="insights-header" onclick="toggleInsights(this)">
          <span class="insights-title">Insights · ${insights.insights.length}</span>
          <span class="insights-toggle open">▲</span>
        </div>
        ${summary}
        <div class="insight-cards">${cards}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="bot-header">
      <div class="bot-avatar">🤖</div>
      <span class="bot-name">analyst · rappi</span>
    </div>
    <div class="answer-card">${escHtml(answer)}</div>
    ${insightsHtml}`;

  msgs.appendChild(el);
  scrollToBottom();
}

function toggleInsights(header) {
  const toggle = header.querySelector('.insights-toggle');
  const cards  = header.parentElement.querySelector('.insight-cards');
  const summary = header.parentElement.querySelector('.insight-summary');
  const open = toggle.classList.toggle('open');
  toggle.textContent = open ? '▲' : '▼';
  if (cards) cards.style.display = open ? '' : 'none';
  if (summary) summary.style.display = open ? '' : 'none';
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
